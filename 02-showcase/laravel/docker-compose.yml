services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: gates/discount-service:local
    container_name: discount-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stderr
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: discount-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: discount-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: discount
      MYSQL_USER: discount
      MYSQL_PASSWORD: discount
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
